name: CI

# Verifies the portable engine (PebbleCore) and its headless tools build and
# pass off-Apple. The macOS game app is not built here — it needs a
# Metal-capable runner; see WINDOWS.md.
#
# Each job: builds the engine, runs the 456-check golden suite, then renders a
# world map with pebmap and uploads it as an artifact — a downloadable proof
# that Pebble's worldgen runs on that platform.

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Engine + golden suite (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Golden suite (456 checks)
        run: swift run pebsmoke
      - name: Render a world map (seed 4242)
        run: swift run pebmap --seed 4242 --chunks 32 --out pebble-map-linux.bmp
      - name: Boot the sim and render a first-person frame (pebwin)
        run: swift run pebwin --seed 4242 --ticks 300 --time 14000 --shot pebble-view-linux.bmp
      - uses: actions/upload-artifact@v4
        with:
          name: world-map-linux
          path: pebble-map-linux.bmp
      - uses: actions/upload-artifact@v4
        with:
          name: first-person-linux
          path: pebble-view-linux.bmp

  gpu-compile:
    name: GPU renderer compiles (SDL_gpu, Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: apt-get update && apt-get install -y --no-install-recommends cmake ninja-build git
      - name: Build & install SDL3
        run: |
          git clone --depth 1 --branch main https://github.com/libsdl-org/SDL.git /tmp/SDL
          cmake -S /tmp/SDL -B /tmp/SDL/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DSDL_TEST_LIBRARY=OFF -DSDL_X11=OFF -DSDL_WAYLAND=OFF \
            -DSDL_UNIX_CONSOLE_BUILD=ON
          cmake --build /tmp/SDL/build
          cmake --install /tmp/SDL/build
          ldconfig || true
      - name: Compile pebwin with the SDL_gpu backend
        run: PEBBLE_GPU=1 swift build --target pebwin -Xcc -I/usr/local/include -Xlinker -L/usr/local/lib
      - name: Compile shaders (GLSL → SPIR-V)
        run: |
          apt-get install -y --no-install-recommends glslang-tools
          cd Sources/pebwin/shaders
          glslangValidator -V -S vert section.vert.glsl       -o section.vert.spv
          glslangValidator -V -S frag section.frag.glsl       -o section.frag.spv
          glslangValidator -V -S frag section_blend.frag.glsl -o section_blend.frag.spv
      - uses: actions/upload-artifact@v4
        with:
          name: pebwin-shaders-spv
          path: Sources/pebwin/shaders/*.spv

  windows:
    name: Engine + golden suite (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.1"
      - name: Build
        run: swift build
      - name: Golden suite (456 checks)
        run: swift run pebsmoke
      - name: Render a world map (seed 4242)
        run: swift run pebmap --seed 4242 --chunks 32 --out pebble-map-windows.bmp
      - name: Boot the sim and render a first-person frame (pebwin)
        run: swift run pebwin --seed 4242 --ticks 300 --time 14000 --shot pebble-view-windows.bmp
      - uses: actions/upload-artifact@v4
        with:
          name: world-map-windows
          path: pebble-map-windows.bmp
      - uses: actions/upload-artifact@v4
        with:
          name: first-person-windows
          path: pebble-view-windows.bmp

  windows-exe:
    name: Build a playable Windows .exe (SDL window)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.1"
      - name: Install SDL3 (vcpkg)
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "sdl3:x64-windows"
      - name: Build pebwin (release, SDL window)
        shell: pwsh
        env:
          PEBBLE_SDL: "1"
        run: |
          $inc = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\include"
          $lib = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib"
          swift build -c release --product pebwin -Xcc "-I$inc" -Xlinker "-L$lib"
      - name: Assemble the distributable
        shell: pwsh
        run: |
          $dist = "pebble-windows"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item ".build\release\pebwin.exe" $dist
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\SDL3.dll" $dist
          # bundle the Swift runtime DLLs the exe links against
          $swiftExe = (Get-Command swift.exe).Source
          $rt = Split-Path $swiftExe
          Get-ChildItem "$rt\*.dll" |
            Where-Object { $_.Name -match '^(swift|Foundation|dispatch|BlocksRuntime|_Foundation|_?[Cc]oncurrency|_?StringProcessing|_?RegexParser|icu|swiftSynchronization|swiftWinSDK|swiftCRT|vcruntime|msvcp)' } |
            Copy-Item -Destination $dist -ErrorAction SilentlyContinue
          "@echo off`r`nstart """" pebwin.exe --window`r`n" | Out-File -Encoding ascii "$dist\play.bat"
          @"
          Pebble for Windows (preview build)

          Double-click play.bat (or run pebwin.exe --window) to open a window.
          Controls: WASD move, mouse look, Space jump, Shift sneak, Esc/close to quit.
          This is the CPU renderer (textured, day/night). Everything runs locally.

          If Windows SmartScreen warns about an unsigned app, choose "More info" -> "Run anyway".
          "@ | Out-File -Encoding ascii "$dist\README.txt"
          Get-ChildItem $dist | Select-Object Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: pebble-windows-exe
          path: pebble-windows
